<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade ITM — Full Homepage Mockup with 7-Day Trial</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0A0A0B;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .container {
      width: 1200px;
      height: 400px;
      background: linear-gradient(135deg, rgba(10, 10, 11, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      border-top: 3px solid #10B981;
      box-shadow: 0 20px 60px rgba(16, 185, 129, 0.15);
    }

    /* Glassmorphism background */
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/></filter></defs><rect width="1200" height="400" fill="%230A0A0B" opacity="0.5"/></svg>');
      opacity: 0.3;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 40px;
    }

    /* Left section - 7-Day Trial */
    .left-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .trial-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #10B981;
      font-family: 'Inter', sans-serif;
    }

    .trial-headline {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1;
      text-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
    }

    .trial-subtext {
      font-size: 13px;
      color: #F3E5AB;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* Center section - Stats */
    .center-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 0 40px;
    }

    .stat-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .stat-number {
      font-family: 'Courier New', monospace;
      font-size: 56px;
      font-weight: 700;
      color: #10B981;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }

    .stat-label {
      font-size: 13px;
      color: #FFFFFF;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 80px;
      background: linear-gradient(180deg, rgba(16, 185, 129, 0) 0%, rgba(16, 185, 129, 0.5) 50%, rgba(16, 185, 129, 0) 100%);
    }

    /* Right section - Price & CTA */
    .right-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }

    .price {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 800;
      color: #10B981;
      line-height: 1;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }

    .price-period {
      font-size: 13px;
      color: #F3E5AB;
      font-weight: 400;
    }

    .cta-button {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: #0A0A0B;
      border: none;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-radius: 6px;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(16, 185, 129, 0.4);
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .cta-button:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
    }

    .performance-text {
      font-size: 11px;
      color: #F3E5AB;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-align: right;
      margin-top: 4px;
    }

    /* Accent glow effects */
    .glow-1 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      top: -100px;
      right: 200px;
      z-index: 0;
      filter: blur(40px);
    }

    .glow-2 {
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -80px;
      left: 100px;
      z-index: 0;
      filter: blur(40px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="content">
      <div class="left-section">
        <div class="trial-label">EXCLUSIVE OFFER</div>
        <div class="trial-headline">7-DAY<br>TRIAL</div>
        <div class="trial-subtext">February 2026 Performance</div>
      </div>

      <div class="center-section">
        <div class="stat-block">
          <div class="stat-number">81%</div>
          <div class="stat-label">Win Rate</div>
        </div>
        <div class="divider"></div>
        <div class="stat-block">
          <div class="stat-number">6:1</div>
          <div class="stat-label">Profit Factor</div>
        </div>
      </div>

      <div class="right-section">
        <div>
          <div class="price">$49.99</div>
          <div class="price-period">for 7 days</div>
        </div>
        <a href="https://whop.com/checkout/plan_NeOYhHAwtWczQ" class="cta-button">START YOUR TRIAL →</a>
      </div>
    </div>
  </div>
</body>
</html>
