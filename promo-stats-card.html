<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade ITM - February 2026 Performance Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0A0A0B;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 25px 70px rgba(16, 185, 129, 0.12),
                  inset 0 1px 0 rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(16, 185, 129, 0.25);
      box-shadow: 0 35px 90px rgba(16, 185, 129, 0.18),
                  inset 0 1px 0 rgba(255, 255, 255, 0.16);
      transform: translateY(-4px);
    }

    /* Glass effect background */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400"><defs><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M 30 0 L 0 0 0 30" fill="none" stroke="%23ffffff" stroke-width="0.5" opacity="0.05"/></pattern></defs><rect width="600" height="400" fill="%23ffffff" opacity="0.01"/><rect width="600" height="400" fill="url(%23grid)"/></svg>');
      opacity: 0.4;
      pointer-events: none;
    }

    /* Gradient glow overlay */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% -30%, rgba(16, 185, 129, 0.1), transparent 60%);
      pointer-events: none;
      border-radius: 20px;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* Headline */
    .headline {
      text-align: center;
    }

    .headline-title {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
    }

    .headline-subtitle {
      font-size: 13px;
      color: #F3E5AB;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .stat-callout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }

    .stat-callout:hover {
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.05);
    }

    .stat-value {
      font-family: 'Courier New', monospace;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.25);
    }

    .stat-callout:nth-child(1) .stat-value {
      color: #10B981;
    }

    .stat-callout:nth-child(2) .stat-value {
      color: #F3E5AB;
    }

    .stat-label {
      font-size: 12px;
      color: #FFFFFF;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-align: center;
    }

    /* CTA section */
    .cta-section {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .cta-text {
      font-size: 15px;
      color: #E5E7EB;
      font-weight: 500;
    }

    .cta-button {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: #0A0A0B;
      border: none;
      padding: 13px 32px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 28px rgba(16, 185, 129, 0.3);
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(16, 185, 129, 0.4);
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .cta-button:active {
      transform: translateY(0);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    /* Accent line */
    .accent-line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #10B981 50%, transparent 100%);
      margin-top: 12px;
    }

    /* Disclaimer */
    .disclaimer {
      text-align: center;
      padding-top: 12px;
    }

    .disclaimer-text {
      font-size: 11px;
      color: #9CA3AF;
      font-weight: 400;
      letter-spacing: 0.3px;
      line-height: 1.4;
      font-style: italic;
    }

    /* Glow effect elements */
    .glow-accent {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -100px;
      right: -80px;
      z-index: 0;
      filter: blur(50px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="glow-accent"></div>

      <div class="content">
        <div class="headline">
          <div class="headline-subtitle">Proven Performance</div>
          <div class="headline-title">February 2026 Results</div>
        </div>

        <div class="stats-grid">
          <div class="stat-callout">
            <div class="stat-value">81%</div>
            <div class="stat-label">Win Rate</div>
          </div>
          <div class="stat-callout">
            <div class="stat-value">6:1</div>
            <div class="stat-label">Profit Factor</div>
          </div>
        </div>

        <div class="accent-line"></div>

        <div class="cta-section">
          <div class="cta-text">Experience it for <strong>$49.99</strong></div>
          <a href="https://whop.com/checkout/plan_NeOYhHAwtWczQ" class="cta-button">Start Your 7-Day Trial</a>
          <div class="disclaimer">
            <div class="disclaimer-text">Past performance does not guarantee future results</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
