<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade ITM - 7-Day Trial Pricing Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0A0A0B;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 400px;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(16, 185, 129, 0.1),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(16, 185, 129, 0.2);
      box-shadow: 0 30px 80px rgba(16, 185, 129, 0.15),
                  inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
    }

    /* Corner accent borders */
    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 2px solid #10B981;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }

    .card:hover .corner-tl,
    .card:hover .corner-tr,
    .card:hover .corner-bl,
    .card:hover .corner-br {
      opacity: 0.6;
    }

    .corner-tl {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
      border-radius: 2px 0 0 0;
    }

    .corner-tr {
      top: -1px;
      right: -1px;
      border-left: none;
      border-bottom: none;
      border-radius: 0 2px 0 0;
    }

    .corner-bl {
      bottom: -1px;
      left: -1px;
      border-right: none;
      border-top: none;
      border-radius: 0 0 0 2px;
    }

    .corner-br {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
      border-radius: 0 0 2px 0;
    }

    /* Tier header */
    .tier-header {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      padding: 24px 24px;
      position: relative;
      overflow: hidden;
    }

    .tier-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="%23ffffff" stroke-width="0.5" opacity="0.1"/></pattern></defs><rect width="400" height="80" fill="%23ffffff" opacity="0.02"/><rect width="400" height="80" fill="url(%23grid)"/></svg>');
      opacity: 0.3;
    }

    .tier-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .tier-text {
      flex: 1;
    }

    .tier-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 4px;
      display: block;
    }

    .tier-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.1;
    }

    .new-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.15);
      color: #FFFFFF;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    /* Subtitle */
    .subtitle {
      padding: 0 24px;
      margin-top: 20px;
      margin-bottom: 12px;
    }

    .subtitle-text {
      font-size: 13px;
      color: #F3E5AB;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Price section */
    .price-section {
      padding: 0 24px;
      margin-bottom: 28px;
    }

    .price-display {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .price-amount {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 800;
      color: #10B981;
      line-height: 1;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }

    .price-period {
      font-size: 13px;
      color: #F3E5AB;
      font-weight: 400;
      line-height: 1.2;
    }

    /* Features list */
    .features {
      padding: 0 24px;
      margin-bottom: 28px;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #E5E7EB;
      line-height: 1.5;
    }

    .feature-check {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #10B981;
      font-weight: 700;
      font-size: 14px;
    }

    /* CTA Button */
    .cta-section {
      padding: 0 24px 24px;
    }

    .cta-button {
      width: 100%;
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: #0A0A0B;
      border: none;
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
      text-decoration: none;
      display: block;
      text-align: center;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(16, 185, 129, 0.4);
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .cta-button:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
    }

    /* Disclaimer */
    .disclaimer {
      padding: 0 24px 20px;
      text-align: center;
    }

    .disclaimer-text {
      font-size: 11px;
      color: #F3E5AB;
      font-weight: 400;
      letter-spacing: 0.3px;
      line-height: 1.4;
    }

    /* Glow effects */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% -50%, rgba(16, 185, 129, 0.15), transparent 60%);
      pointer-events: none;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="tier-header">
      <div class="tier-content">
        <div class="tier-text">
          <span class="tier-label">Limited Time</span>
          <div class="tier-title">7-DAY TRIAL</div>
        </div>
        <div class="new-badge">NEW</div>
      </div>
    </div>

    <div class="subtitle">
      <div class="subtitle-text">Core Sniper Access</div>
    </div>

    <div class="price-section">
      <div class="price-display">
        <span class="price-amount">$49.99</span>
        <span class="price-period">for 7 days</span>
      </div>
    </div>

    <div class="features">
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>Full Core Sniper SPX Alerts</span>
        </div>
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>Morning Watchlist Access</span>
        </div>
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>Educational Commentary</span>
        </div>
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>Community Access</span>
        </div>
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>81% Win Rate Track Record</span>
        </div>
      </div>
    </div>

    <div class="cta-section">
      <a href="https://whop.com/checkout/plan_NeOYhHAwtWczQ" class="cta-button">Start Trial</a>
    </div>

  </div>
</body>
</html>
